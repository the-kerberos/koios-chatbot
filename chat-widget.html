<!-- ASK KOIOS AI — CHAT WIDGET -->
<!-- Add this before </body> in index.html -->
<!-- Update CHATBOT_URL with your Render.com URL -->
<!-- ═══════════════════════════════════════════════ -->
<style>
  .koios-chat-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8a44e, #b8943e);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(10,22,40,0.3);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .koios-chat-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(10,22,40,0.4);
  }
  .koios-chat-fab svg { width: 26px; height: 26px; }
  .koios-chat-fab .close-icon { display: none; }
  .koios-chat-fab.open .chat-icon { display: none; }
  .koios-chat-fab.open .close-icon { display: block; }

  .koios-chat-panel {
    position: fixed;
    bottom: 92px;
    right: 24px;
    width: 380px;
    max-height: 520px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 12px 48px rgba(10,22,40,0.18);
    z-index: 9998;
    display: none;
    flex-direction: column;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, sans-serif;
  }
  .koios-chat-panel.open { display: flex; }

  .koios-chat-header {
    background: #0a1628;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .koios-chat-header-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8a44e, #e0c476);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #0a1628;
    font-family: Georgia, serif;
    flex-shrink: 0;
  }
  .koios-chat-header-text h4 {
    color: #fff;
    font-size: 0.88rem;
    font-weight: 600;
    margin: 0;
    line-height: 1.3;
  }
  .koios-chat-header-text span {
    color: #b0ada5;
    font-size: 0.72rem;
  }

  .koios-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 340px;
    min-height: 200px;
  }

  .koios-msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.84rem;
    line-height: 1.55;
    word-wrap: break-word;
  }
  .koios-msg a { color: #c8a44e; text-decoration: underline; text-underline-offset: 2px; }
  .koios-msg-bot {
    background: #f3f2ee;
    color: #0a1628;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .koios-msg-user {
    background: #0a1628;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .koios-msg-typing {
    background: #f3f2ee;
    color: #8a877f;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    font-style: italic;
  }

  .koios-chat-input-wrap {
    padding: 12px 14px;
    border-top: 1px solid #e8e6e1;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .koios-chat-input {
    flex: 1;
    border: 1px solid #e8e6e1;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.84rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    color: #0a1628;
  }
  .koios-chat-input:focus { border-color: #c8a44e; }
  .koios-chat-input::placeholder { color: #b0ada5; }
  .koios-chat-send {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #c8a44e;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .koios-chat-send:hover { background: #e0c476; }
  .koios-chat-send:disabled { background: #d3d1c7; cursor: not-allowed; }
  .koios-chat-send svg { width: 16px; height: 16px; }

  .koios-chat-quick {
    padding: 0 14px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .koios-quick-btn {
    background: none;
    border: 1px solid #e8e6e1;
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 0.72rem;
    color: #6b6860;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .koios-quick-btn:hover {
    border-color: #c8a44e;
    color: #c8a44e;
  }

  @media (max-width: 480px) {
    .koios-chat-panel {
      right: 8px;
      left: 8px;
      bottom: 84px;
      width: auto;
      max-height: 70vh;
    }
  }
</style>

<!-- FAB button -->
<button class="koios-chat-fab" id="koiosChatFab" aria-label="Ask Koios AI">
  <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="#0a1628" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="#0a1628" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>

<!-- Chat panel -->
<div class="koios-chat-panel" id="koiosChatPanel">
  <div class="koios-chat-header">
    <div class="koios-chat-header-icon">&Sigma;</div>
    <div class="koios-chat-header-text">
      <h4>Ask Koios AI</h4>
      <span>Powered by AI &middot; Typically replies instantly</span>
    </div>
  </div>
  <div class="koios-chat-messages" id="koiosChatMessages">
    <div class="koios-msg koios-msg-bot">Hi! I'm the Koios Analytics AI assistant. I can tell you about our services, case studies, EU AI Act expertise, or help you figure out if we're a good fit. What would you like to know?</div>
  </div>
  <div class="koios-chat-quick" id="koiosChatQuick">
    <button class="koios-quick-btn" onclick="koiosSendQuick(this)">What services do you offer?</button>
    <button class="koios-quick-btn" onclick="koiosSendQuick(this)">Show me case studies</button>
    <button class="koios-quick-btn" onclick="koiosSendQuick(this)">EU AI Act compliance</button>
    <button class="koios-quick-btn" onclick="koiosSendQuick(this)">Odoo AI integration</button>
  </div>
  <div class="koios-chat-input-wrap">
    <input type="text" class="koios-chat-input" id="koiosChatInput" placeholder="Ask me anything about Koios..." maxlength="500" autocomplete="off">
    <button class="koios-chat-send" id="koiosChatSend" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a1628" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  // ── CONFIG ──────────────────────────────────
  // Replace with your Render.com deployment URL
  const CHATBOT_URL = 'https://ask-koios-ai.onrender.com';
  // ────────────────────────────────────────────

  const fab = document.getElementById('koiosChatFab');
  const panel = document.getElementById('koiosChatPanel');
  const msgs = document.getElementById('koiosChatMessages');
  const input = document.getElementById('koiosChatInput');
  const sendBtn = document.getElementById('koiosChatSend');
  const quickWrap = document.getElementById('koiosChatQuick');

  let history = [];
  let busy = false;

  fab.addEventListener('click', () => {
    const isOpen = panel.classList.toggle('open');
    fab.classList.toggle('open', isOpen);
    if (isOpen) input.focus();
  });

  function addMsg(text, role) {
    const div = document.createElement('div');
    div.className = 'koios-msg koios-msg-' + role;
    // Convert URLs to links and preserve line breaks
    div.innerHTML = text
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function send(text) {
    if (busy || !text.trim()) return;
    busy = true;
    sendBtn.disabled = true;
    input.value = '';

    // Hide quick buttons after first use
    if (quickWrap) quickWrap.style.display = 'none';

    addMsg(text, 'user');
    const typing = addMsg('Thinking...', 'typing');

    try {
      const res = await fetch(CHATBOT_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history })
      });

      if (!res.ok) throw new Error('API error');
      const data = await res.json();

      typing.remove();
      addMsg(data.reply, 'bot');

      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: data.reply });
      // Keep history manageable
      if (history.length > 20) history = history.slice(-20);

    } catch (e) {
      typing.remove();
      addMsg('Sorry, I\'m having trouble connecting. Please try again or email solutions@koios-analytics.com.', 'bot');
    }

    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', () => send(input.value));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
  });

  // Quick button handler (global for onclick)
  window.koiosSendQuick = function(btn) { send(btn.textContent); };
})();
</script>
